# Name of the service
spring.application.name=api-gateway

# The main entry-point port for your entire microservices network
server.port=8080

# Connect this gateway to our Eureka Server phonebook
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ==========================================
# 🗺️ MICROSERVICES ROUTING CONFIGURATION
# ==========================================

# Route 1: Route any path starting with /api/v1/auth/ to the AUTH-SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# Route 2: Route any path starting with /api/v1/events/ to the EVENT-SERVICE
spring.cloud.gateway.routes[1].id=event-service
spring.cloud.gateway.routes[1].uri=lb://event-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/events/**